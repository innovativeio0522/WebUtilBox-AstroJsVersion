<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg1" cx="0%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="2" rx="12"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="#3b82f6" rx="2"/>

  <!-- Logo -->
  <text x="60" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#ffffff" opacity="0.9">🧰 Webutilbox</text>

  <!-- Emoji -->
  <text x="60" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="110" fill="#3b82f6">⏱</text>

  <!-- Category label -->
  <text x="60" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff">Timer Tools</text>

  <!-- Subtitle -->
  <text x="60" y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#a1a1aa">Countdown • Stopwatch • Pomodoro • Time Zones</text>

  <!-- URL -->
  <text x="60" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#3b82f6" opacity="0.8">webutilbox.com — Free online tools, no signup required</text>

  <!-- Decorative dots grid -->
  <g opacity="0.06" fill="#3b82f6">
    <circle cx="1100" cy="150" r="4"/><circle cx="1140" cy="150" r="4"/>
    <circle cx="1100" cy="190" r="4"/><circle cx="1140" cy="190" r="4"/>
    <circle cx="1100" cy="230" r="4"/><circle cx="1140" cy="230" r="4"/>
    <circle cx="1060" cy="150" r="4"/><circle cx="1060" cy="190" r="4"/><circle cx="1060" cy="230" r="4"/>
    <circle cx="1100" cy="270" r="4"/><circle cx="1140" cy="270" r="4"/><circle cx="1060" cy="270" r="4"/>
    <circle cx="1100" cy="310" r="4"/><circle cx="1140" cy="310" r="4"/><circle cx="1060" cy="310" r="4"/>
  </g>
</svg>